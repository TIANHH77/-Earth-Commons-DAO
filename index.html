<!doctype html>
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Earth Commons DAO | Nodo Planetario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; overflow: hidden; }
        
        /* Tierra Central con Glitch de Daño */
        .earth-wrapper { position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .earth-sphere {
            width: 350px; height: 350px; border-radius: 50%;
            background: radial-gradient(circle, #22c55e 0%, #1e40af 80%, #000 100%);
            position: relative; z-index: 10; transition: all 0.5s ease;
            animation: rotate-earth 60s linear infinite;
        }

        .damage-glitch { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; filter: hue-rotate(90deg) saturate(2); }

        @keyframes rotate-earth { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } }

        /* Capas Laterales */
        .layer-box {
            position: absolute; width: 250px; padding: 20px; background: rgba(255,255,255,0.02);
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
        }

        /* Data Incómoda (Ticker) */
        #data-ticker {
            position: absolute; top: 10%; width: 100%; text-align: center;
            color: #ef4444; font-weight: bold; font-family: monospace; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="data-ticker">SISTEMA TERMINAL: MONITOREO DE FALLOS...</div>

    <main class="earth-wrapper">
        <div class="layer-box" style="top:15%; left:5%">
            <p class="text-green-400 font-bold text-xs uppercase">Capa 1: Formal</p>
            <p class="text-[10px] text-gray-400">Transparencia absoluta en flujos de capital público.</p>
        </div>
        <div class="layer-box" style="bottom:15%; left:5%">
            <p class="text-blue-400 font-bold text-xs uppercase">Capa 2: Reciproca</p>
            <p class="text-[10px] text-gray-400">Economía del cuidado protegida por ZK-Proofs.</p>
        </div>

        <div id="earth" class="earth-sphere flex items-center justify-center">
            <button onclick="activateNode()" class="z-20 bg-white text-black font-bold py-5 px-10 rounded-full hover:scale-110 transition shadow-2xl">
                ACTIVAR NODO IA
            </button>
        </div>

        <div class="layer-box" style="top:15%; right:5%">
            <p class="text-purple-400 font-bold text-xs uppercase">Capa 3: Sombra</p>
            <p class="text-[10px] text-gray-400">Consentimiento libre y custodia mutua.</p>
        </div>
        <div class="layer-box" style="bottom:15%; right:5%">
            <p class="text-yellow-400 font-bold text-xs uppercase">Capa 4: Evolución</p>
            <p class="text-[10px] text-gray-400">Transferencia de saberes y resiliencia.</p>
        </div>
    </main>

    <script>
        const rawData = [
            "FALLO: $10.8 TRILLONES EN CUIDADO INVISIBLE",
            "ERROR: 60% ACTIVIDAD ECONÓMICA CRIMINALIZADA",
            "CRISIS: DESIGUALDAD ESTRUCTURAL CRÓNICA",
            "ALERTA: SEDENTARISMO IMPUESTO POR FRONTERAS",
            "SÍNTOMA: PACIENTE TERMINAL EN NEGACIÓN"
        ];

        const ticker = document.getElementById('data-ticker');
        const earth = document.getElementById('earth');

        // Ciclo de Daño (Glitch)
        setInterval(() => {
            const randomData = rawData[Math.floor(Math.random() * rawData.length)];
            ticker.innerText = randomData;
            earth.classList.add('damage-glitch');
            setTimeout(() => earth.classList.remove('damage-glitch'), 500);
        }, 4000);

        function activateNode() {
            alert("Sincronizando con Earth Commons DAO... Iniciando Protocolo de Sanación Sistémica.");
            earth.style.background = "radial-gradient(circle, #4ade80 0%, #3b82f6 100%)";
            earth.style.boxShadow = "0 0 150px rgba(74, 222, 128, 0.6)";
            ticker.style.color = "#4ade80";
            ticker.innerText = "NODO ACTIVO: ECONOMÍA RECÍPROCA INICIADA";
        }
    </script>
</body>
</html>
