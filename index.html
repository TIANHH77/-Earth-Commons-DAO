<!doctype html>
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Earth Commons DAO | El Despertar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; overflow: hidden; }
        
        /* Tierra Clásica con Efecto de Daño */
        .earth-container { position: relative; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .earth-map {
            width: 400px; height: 400px; border-radius: 50%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/c/cb/The_Blue_Marble_cloudless.jpg');
            background-size: cover; box-shadow: inset -20px -20px 50px #000, 0 0 20px rgba(239, 68, 68, 0.4);
            transition: all 2s ease; animation: rotate 30s linear infinite; filter: grayscale(0.5) sepia(0.2) saturate(0.8);
        }

        /* Capas que aparecen secuencialmente */
        .floating-layer {
            position: absolute; width: 280px; padding: 20px; background: rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px;
            opacity: 0; transform: scale(0.8); transition: all 1s ease; z-index: 30;
        }

        .show-layer { opacity: 1; transform: scale(1); }

        /* Estados de la Tierra */
        .earth-damaged { filter: grayscale(1) contrast(1.2) !important; border: 2px solid #ef4444; }
        .earth-paradigm { 
            filter: saturate(1.5) brightness(1.1) !important; 
            box-shadow: 0 0 100px rgba(74, 222, 128, 0.5) !important;
            transform: scale(1.1);
        }

        @keyframes rotate { from { background-position: 0 0; } to { background-position: 800px 0; } }
        
        #paradigm-btn { display: none; }
    </style>
</head>
<body>

    <div id="data-ticker" class="absolute top-5 w-full text-center text-red-500 text-xs tracking-[0.5em] z-50">
        SISTEMA TERMINAL: DETECTANDO AGRIETAMIENTO...
    </div>

    <main class="earth-container">
        <div id="layer1" class="floating-layer top-10 left-10 border-green-500/50">
            <h3 class="text-green-400 font-bold mb-2">01. CAPA FORMAL</h3>
            <p class="text-[10px] text-gray-400">Transparencia absoluta en bonos e inversiones.</p>
        </div>

        <div id="layer2" class="floating-layer bottom-10 left-10 border-blue-500/50">
            <h3 class="text-blue-400 font-bold mb-2">02. RECIPROCIDAD</h3>
            <p class="text-[10px] text-gray-400">Protegiendo el valor del cuidado ($10.8T).</p>
        </div>

        <div id="layer3" class="floating-layer top-10 right-10 border-purple-500/50">
            <h3 class="text-purple-400 font-bold mb-2">03. LA SOMBRA</h3>
            <p class="text-[10px] text-gray-400">Integración de la economía real reprimida.</p>
        </div>

        <div id="layer4" class="floating-layer bottom-10 right-10 border-yellow-500/50">
            <h3 class="text-yellow-400 font-bold mb-2">04. EVOLUCIÓN</h3>
            <p class="text-[10px] text-gray-400">Protocolo PAL: Acción precede a consciencia.</p>
        </div>

        <div id="earth" class="earth-map earth-damaged"></div>

        <div id="paradigm-btn" class="absolute z-50 text-center">
            <button onclick="changeParadigm()" class="bg-white text-black font-bold py-4 px-10 rounded-full shadow-[0_0_50px_rgba(255,255,255,0.4)] hover:scale-110 transition">
                ACTIVAR CAMBIO DE PARADIGMA
            </button>
        </div>
    </main>

    <script>
        // Secuencia de Introducción
        setTimeout(() => document.getElementById('layer1').classList.add('show-layer'), 1500);
        setTimeout(() => document.getElementById('layer2').classList.add('show-layer'), 3000);
        setTimeout(() => document.getElementById('layer3').classList.add('show-layer'), 4500);
        setTimeout(() => document.getElementById('layer4').classList.add('show-layer'), 6000);
        setTimeout(() => {
            document.getElementById('paradigm-btn').style.display = 'block';
            document.getElementById('data-ticker').innerText = "ESTRUCTURA COMPLETA: LISTO PARA REESTRUCTURACIÓN";
            document.getElementById('data-ticker').classList.replace('text-red-500', 'text-yellow-500');
        }, 7500);

        function changeParadigm() {
            const earth = document.getElementById('earth');
            const ticker = document.getElementById('data-ticker');
            
            earth.classList.replace('earth-damaged', 'earth-paradigm');
            ticker.innerText = "NUEVO PARADIGMA ACTIVO: ECONOMÍA RECÍPROCA GLOBAL";
            ticker.classList.replace('text-yellow-500', 'text-green-400');
            
            alert("Protocolo de Custodia Mutua Iniciado. La Tierra ya no es un territorio de fronteras, sino un pro-común.");
        }
    </script>
</body>
</html>
